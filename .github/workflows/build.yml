name: Build TEE Simulator Plus

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Build native library
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cd module/native
          $ANDROID_NDK_HOME/ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=jni/Android.mk NDK_APPLICATION_MK=jni/Application.mk
          echo "Build complete"
          ls -la libs/arm64-v8a/ libs/armeabi-v7a/ 2>/dev/null || true

      - name: Copy built libraries to module
        run: |
          mkdir -p module/libs/arm64-v8a module/libs/armeabi-v7a
          cp module/native/libs/arm64-v8a/libteesimplus.so module/libs/arm64-v8a/ 2>/dev/null || echo "arm64 lib not found"
          cp module/native/libs/armeabi-v7a/libteesimplus.so module/libs/armeabi-v7a/ 2>/dev/null || echo "armv7 lib not found"

      - name: Package module zip
        run: |
          cd module
          zip -r ../tee-simulator-plus-v1.0.0.zip \
            META-INF/ \
            module.prop \
            customize.sh \
            post-fs-data.sh \
            service.sh \
            sepolicy.rule \
            config/ \
            docs/ \
            keyboxes/ \
            libs/ \
            logs/ \
            scripts/ \
            webroot/ \
            -x "*.gitkeep" \
            -x "native/*"
          cd ..
          echo "Module zip created:"
          ls -la tee-simulator-plus-v1.0.0.zip
          echo "Contents:"
          unzip -l tee-simulator-plus-v1.0.0.zip

      - name: Upload module zip
        uses: actions/upload-artifact@v4
        with:
          name: tee-simulator-plus-module
          path: tee-simulator-plus-v1.0.0.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: tee-simulator-plus-v1.0.0.zip
          generate_release_notes: true
