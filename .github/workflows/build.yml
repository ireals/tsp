name: Build TEE Simulator Plus

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      teesimulator_repo:
        description: 'TEESimulator source repo'
        required: false
        default: 'JingMatrix/TEESimulator'
      teesimulator_ref:
        description: 'Branch / tag / commit'
        required: false
        default: 'main'

env:
  TEESIMULATOR_REPO: ${{ github.event.inputs.teesimulator_repo || 'JingMatrix/TEESimulator' }}
  TEESIMULATOR_REF: ${{ github.event.inputs.teesimulator_ref || 'main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout WebUI overlay
        uses: actions/checkout@v4
        with:
          path: overlay

      - name: Checkout TEESimulator source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TEESIMULATOR_REPO }}
          ref: ${{ env.TEESIMULATOR_REF }}
          path: teesimulator
          submodules: recursive

      - name: Apply Latency Equalizer patch
        run: |
          cd teesimulator

          # Locate AttestationPatcher.kt — the cert chain patching entry point
          PATCHER=$(find . -name "AttestationPatcher.kt" | head -1)
          if [ -z "$PATCHER" ]; then
            echo "ERROR: AttestationPatcher.kt not found"
            find . -name "*.kt" | head -20
            exit 1
          fi
          echo "Found patcher target: $PATCHER"

          python3 ../overlay/patches/apply_latency_patch.py "$PATCHER"

          echo ""
          echo "=== Patched file (head) ==="
          head -120 "$PATCHER"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('teesimulator/**/*.gradle*', 'teesimulator/**/gradle-wrapper.properties') }}

      - name: Build TEESimulator module
        working-directory: teesimulator
        env:
          # Increase JVM heap and Metaspace to avoid OOM during R8/Lint
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=2g -Dorg.gradle.daemon=false -Dorg.gradle.workers.max=2"
        run: |
          chmod +x gradlew
          # Override gradle.properties with larger memory settings
          {
            echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=2g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8"
            echo "org.gradle.daemon=false"
            echo "org.gradle.parallel=false"
            echo "org.gradle.workers.max=2"
            echo "kotlin.daemon.jvmargs=-Xmx2g -XX:MaxMetaspaceSize=1g"
          } >> gradle.properties

          echo "=== gradle.properties (final) ==="
          cat gradle.properties

          # TEESimulator's build script defines a `zipRelease` task that produces
          # the flashable Magisk/KSU module zip in ./out/. Use it directly.
          echo "=== Available Gradle tasks (filtered) ==="
          ./gradlew tasks --all --no-daemon 2>&1 | grep -iE 'zip|module|assemble' | head -20 || true

          ./gradlew :app:zipRelease --stacktrace --no-daemon

          echo ""
          echo "=== Build outputs ==="
          ls -la out/ 2>/dev/null || echo "no out/ dir"
          find . -name "TEESimulator*.zip" 2>/dev/null
          find . -name "*.apk" -path "*/outputs/*" 2>/dev/null

      - name: Locate built artifacts
        id: locate
        run: |
          echo "=== Looking in teesimulator/out/ (zipRelease output) ==="
          ls -la teesimulator/out/ 2>/dev/null || echo "no out/ dir"

          # Primary: the zipRelease task outputs to out/TEESimulator-*-Release.zip
          MODULE_ZIP=$(find teesimulator/out -name "TEESimulator-*Release.zip" 2>/dev/null | head -1)

          if [ -z "$MODULE_ZIP" ]; then
            echo "Primary location empty, scanning entire repo..."
            # Fallback: search anywhere, but exclude debug-symbols/intermediates/mapping
            for candidate in $(find teesimulator -name "TEESimulator*.zip" 2>/dev/null); do
              case "$candidate" in
                *native-debug-symbols*|*intermediates*|*mapping*|*sources*|*Debug*) continue ;;
              esac
              MODULE_ZIP="$candidate"
              break
            done
          fi

          if [ -z "$MODULE_ZIP" ]; then
            echo "ERROR: No module zip produced by zipRelease task"
            echo "=== All zip files ==="
            find teesimulator -name "*.zip" 2>/dev/null | head -30
            exit 1
          fi

          echo ""
          echo "=== Selected module zip: $MODULE_ZIP ==="
          ls -la "$MODULE_ZIP"
          echo ""
          echo "=== Module zip contents ==="
          unzip -l "$MODULE_ZIP"

          # Verify it has Magisk module structure
          if ! unzip -l "$MODULE_ZIP" | grep -q "module.prop"; then
            echo "ERROR: Selected zip doesn't contain module.prop"
            exit 1
          fi

          # Convert to absolute path for next step
          ABS_PATH=$(realpath "$MODULE_ZIP")
          echo "module_zip=$ABS_PATH" >> $GITHUB_OUTPUT

      - name: Merge with WebUI overlay
        run: |
          mkdir -p _staging
          cd _staging

          # Extract the TEESimulator module zip as the base
          unzip -o "${{ steps.locate.outputs.module_zip }}" >/dev/null
          echo "=== Base module structure ==="
          find . -maxdepth 3 -type f | sort

          # Overlay our WebUI on top
          cp -r ../overlay/module/webroot ./
          mkdir -p scripts
          cp ../overlay/module/scripts/bridge.sh scripts/
          cp ../overlay/module/scripts/keybox_manager.sh scripts/
          cp ../overlay/module/scripts/target_manager.sh scripts/
          cp ../overlay/module/scripts/config_manager.sh scripts/
          cp ../overlay/module/scripts/latency_profiler.sh scripts/
          cp ../overlay/module/scripts/equalizer_manager.sh scripts/
          chmod +x scripts/*.sh

          mkdir -p docs config logs
          cp -r ../overlay/module/docs/* docs/ 2>/dev/null || true
          cp ../overlay/module/config/config.json config/ 2>/dev/null || true

          # Update module.prop — keep Tricky-Store compatible ID for KSU WebUI compatibility
          # IMPORTANT: KSU WebUI looks up modules by their `id` from module.prop.
          # Keep id=tricky_store (TEESimulator's original) so the webroot/ path resolves
          # to /data/adb/modules/tricky_store/webroot/index.html
          if [ -f module.prop ]; then
            sed -i 's/^name=.*/name=TEE Simulator Plus (TEESimulator + WebUI + Latency Equalizer)/' module.prop
            sed -i 's/^description=.*/description=TEESimulator with KSU WebUI for keybox\/target management and a built-in Latency Equalizer that pads attestation responses to match hardware-backed timing. Based on JingMatrix\/TEESimulator (GPL-3.0)./' module.prop
            echo "=== module.prop ==="
            cat module.prop
          fi

          # Append WebUI bootstrap to post-fs-data.sh (or service.sh if no post-fs-data)
          # Use printf to avoid multiline strings that break YAML indentation.
          for sh_file in post-fs-data.sh service.sh; do
            if [ -f "$sh_file" ]; then
              printf '\n# === TEE Simulator Plus initialization ===\n' >> "$sh_file"
              printf '[ -d /data/adb/tricky_store ] || mkdir -p /data/adb/tricky_store\n' >> "$sh_file"
              printf '[ -f /data/adb/tricky_store/target.txt ] || { echo "# Tricky-Store target list" > /data/adb/tricky_store/target.txt; chmod 644 /data/adb/tricky_store/target.txt; }\n' >> "$sh_file"
            fi
          done

          # Ensure WebUI files have correct permissions (readable by KSU manager)
          find webroot -type d -exec chmod 0755 {} \; 2>/dev/null || true
          find webroot -type f -exec chmod 0644 {} \; 2>/dev/null || true
          find scripts -type f -exec chmod 0755 {} \; 2>/dev/null || true
          find docs -type f -exec chmod 0644 {} \; 2>/dev/null || true
          [ -f post-fs-data.sh ] && chmod 0755 post-fs-data.sh
          [ -f service.sh ] && chmod 0755 service.sh
          [ -f customize.sh ] && chmod 0755 customize.sh

          echo "=== Final structure ==="
          find . -maxdepth 3 -type f | sort

      - name: Package final zip
        run: |
          cd _staging
          zip -r9 ../tee-simulator-plus-v1.0.0.zip . -x "*.gitkeep"
          cd ..
          ls -la tee-simulator-plus-v1.0.0.zip
          echo ""
          echo "=== Contents ==="
          unzip -l tee-simulator-plus-v1.0.0.zip
          echo ""
          echo "=== Integrity ==="
          unzip -t tee-simulator-plus-v1.0.0.zip

      - name: Upload module zip
        uses: actions/upload-artifact@v4
        with:
          name: tee-simulator-plus-EXTRACT-INNER-ZIP
          path: tee-simulator-plus-v1.0.0.zip
          compression-level: 0

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: tee-simulator-plus-v1.0.0.zip
          generate_release_notes: true
          body: |
            # TEE Simulator Plus

            **Source:** ${{ env.TEESIMULATOR_REPO }} @ ${{ env.TEESIMULATOR_REF }}

            **Patches applied:**
            - **Latency Equalizer** in `AttestationPatcher.kt` — pads simulated attestation responses with a measured wait time + Gaussian jitter so the attested/non-attested timing ratio stays under the configured detection threshold

            **Bundled:**
            - KSU WebUI for keybox upload, target app selection, timing diagnostics, equalizer settings
            - `/data/adb/tricky_store/keybox.xml` and `target.txt` (Tricky-Store compatible)
            - `/data/adb/tricky_store/equalizer.conf` for runtime equalizer tuning
