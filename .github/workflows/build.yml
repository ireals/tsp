name: Build TEE Simulator Plus

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Build native library
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: |
          cd module/native
          $ANDROID_NDK_HOME/ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=jni/Android.mk NDK_APPLICATION_MK=jni/Application.mk
          echo "=== Build complete ==="
          find libs -name "*.so" -exec ls -la {} \;

      - name: Prepare module for packaging
        run: |
          # Copy built .so files into module/libs/
          mkdir -p module/libs/arm64-v8a module/libs/armeabi-v7a
          cp module/native/libs/arm64-v8a/libteesimplus.so module/libs/arm64-v8a/
          cp module/native/libs/armeabi-v7a/libteesimplus.so module/libs/armeabi-v7a/

          # Ensure required empty directories have a placeholder
          # (zip needs at least one file per directory)
          touch module/keyboxes/.placeholder
          touch module/logs/.placeholder

          # Remove .gitkeep files
          find module -name ".gitkeep" -delete

      - name: Package module zip
        run: |
          cd module
          # Create zip with only installable files (no native source)
          zip -r9 ../tee-simulator-plus-v1.0.0.zip \
            META-INF/ \
            module.prop \
            customize.sh \
            post-fs-data.sh \
            service.sh \
            sepolicy.rule \
            config/ \
            docs/ \
            keyboxes/ \
            libs/ \
            logs/ \
            scripts/ \
            webroot/ \
            -x "*.gitkeep"

          cd ..
          echo "=== Module zip created ==="
          ls -la tee-simulator-plus-v1.0.0.zip
          echo ""
          echo "=== Contents ==="
          unzip -l tee-simulator-plus-v1.0.0.zip
          echo ""
          echo "=== Verify zip integrity ==="
          unzip -t tee-simulator-plus-v1.0.0.zip

      - name: Upload module zip
        uses: actions/upload-artifact@v4
        with:
          name: tee-simulator-plus-EXTRACT-INNER-ZIP
          path: tee-simulator-plus-v1.0.0.zip
          compression-level: 0

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: tee-simulator-plus-v1.0.0.zip
          generate_release_notes: true
