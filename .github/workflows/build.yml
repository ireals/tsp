name: Build TEE Simulator Plus

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      teesimulator_repo:
        description: 'TEESimulator source repo'
        required: false
        default: 'JingMatrix/TEESimulator'
      teesimulator_ref:
        description: 'Branch / tag / commit'
        required: false
        default: 'main'

env:
  TEESIMULATOR_REPO: ${{ github.event.inputs.teesimulator_repo || 'JingMatrix/TEESimulator' }}
  TEESIMULATOR_REF: ${{ github.event.inputs.teesimulator_ref || 'main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout WebUI overlay
        uses: actions/checkout@v4
        with:
          path: overlay

      - name: Checkout TEESimulator source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TEESIMULATOR_REPO }}
          ref: ${{ env.TEESIMULATOR_REF }}
          path: teesimulator
          submodules: recursive

      - name: Apply Latency Equalizer patch
        run: |
          cd teesimulator

          # Locate AttestationPatcher.kt — the cert chain patching entry point
          PATCHER=$(find . -name "AttestationPatcher.kt" | head -1)
          if [ -z "$PATCHER" ]; then
            echo "ERROR: AttestationPatcher.kt not found"
            find . -name "*.kt" | head -20
            exit 1
          fi
          echo "Found patcher target: $PATCHER"

          python3 ../overlay/patches/apply_latency_patch.py "$PATCHER"

          echo ""
          echo "=== Patched file (head) ==="
          head -120 "$PATCHER"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c
          add-to-path: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('teesimulator/**/*.gradle*', 'teesimulator/**/gradle-wrapper.properties') }}

      - name: Build TEESimulator module
        working-directory: teesimulator
        run: |
          chmod +x gradlew
          # TEESimulator's gradle layout: app + stub. The module zip is built via a Gradle task.
          ./gradlew assembleRelease --stacktrace --no-daemon || \
            ./gradlew :app:assembleRelease --stacktrace --no-daemon

          echo "=== Build outputs ==="
          find . -name "*.zip" -path "*/outputs/*" 2>/dev/null
          find . -name "*.apk" -path "*/outputs/*" 2>/dev/null
          find module -type f 2>/dev/null | head -20 || true

      - name: Locate built artifacts
        id: locate
        run: |
          # Find the produced module zip — TEESimulator typically packages a magisk/ksu zip
          MODULE_ZIP=$(find teesimulator -name "TEESimulator*.zip" 2>/dev/null | head -1)
          if [ -z "$MODULE_ZIP" ]; then
            MODULE_ZIP=$(find teesimulator -name "*.zip" -path "*/outputs/*" 2>/dev/null | head -1)
          fi
          if [ -z "$MODULE_ZIP" ]; then
            # Fallback: build module zip manually from app/build/outputs and module/ template
            echo "No prebuilt zip — assembling manually"
            mkdir -p _manual_module
            cp -r teesimulator/module/* _manual_module/ 2>/dev/null || true
            APK=$(find teesimulator/app/build/outputs/apk/release -name "*.apk" 2>/dev/null | head -1)
            if [ -n "$APK" ]; then
              cp "$APK" _manual_module/teesimulator.apk
            fi
            cd _manual_module
            zip -r9 ../_manual_teesimulator.zip . >/dev/null
            cd ..
            MODULE_ZIP="$PWD/_manual_teesimulator.zip"
          fi
          echo "Module zip: $MODULE_ZIP"
          echo "module_zip=$MODULE_ZIP" >> $GITHUB_OUTPUT
          ls -la "$MODULE_ZIP"

      - name: Merge with WebUI overlay
        run: |
          mkdir -p _staging
          cd _staging

          # Extract the TEESimulator module zip as the base
          unzip -o "${{ steps.locate.outputs.module_zip }}" >/dev/null
          echo "=== Base module structure ==="
          find . -maxdepth 3 -type f | sort

          # Overlay our WebUI on top
          cp -r ../overlay/module/webroot ./
          mkdir -p scripts
          cp ../overlay/module/scripts/bridge.sh scripts/
          cp ../overlay/module/scripts/keybox_manager.sh scripts/
          cp ../overlay/module/scripts/target_manager.sh scripts/
          cp ../overlay/module/scripts/config_manager.sh scripts/
          cp ../overlay/module/scripts/latency_profiler.sh scripts/
          cp ../overlay/module/scripts/equalizer_manager.sh scripts/
          chmod +x scripts/*.sh

          mkdir -p docs config logs
          cp -r ../overlay/module/docs/* docs/ 2>/dev/null || true
          cp ../overlay/module/config/config.json config/ 2>/dev/null || true

          # Update module.prop
          if [ -f module.prop ]; then
            sed -i 's/^id=.*/id=tee-simulator-plus/' module.prop
            sed -i 's/^name=.*/name=TEE Simulator Plus (TEESimulator + WebUI + Latency Equalizer)/' module.prop
            sed -i 's/^description=.*/description=TEESimulator with KSU WebUI for keybox\/target management and a built-in Latency Equalizer that pads attestation responses to evade timing-side-channel detection. Based on JingMatrix\/TEESimulator (GPL-3.0)./' module.prop
          fi

          # Append WebUI bootstrap to post-fs-data.sh (or service.sh if no post-fs-data)
          BOOTSTRAP="
# === TEE Simulator Plus initialization ===
[ -d /data/adb/tricky_store ] || mkdir -p /data/adb/tricky_store
[ -f /data/adb/tricky_store/target.txt ] || { echo '# Tricky-Store target list' > /data/adb/tricky_store/target.txt; chmod 644 /data/adb/tricky_store/target.txt; }
"
          if [ -f post-fs-data.sh ]; then
            echo "$BOOTSTRAP" >> post-fs-data.sh
          fi
          if [ -f service.sh ]; then
            echo "$BOOTSTRAP" >> service.sh
          fi

          echo "=== Final structure ==="
          find . -maxdepth 3 -type f | sort

      - name: Package final zip
        run: |
          cd _staging
          zip -r9 ../tee-simulator-plus-v1.0.0.zip . -x "*.gitkeep"
          cd ..
          ls -la tee-simulator-plus-v1.0.0.zip
          echo ""
          echo "=== Contents ==="
          unzip -l tee-simulator-plus-v1.0.0.zip
          echo ""
          echo "=== Integrity ==="
          unzip -t tee-simulator-plus-v1.0.0.zip

      - name: Upload module zip
        uses: actions/upload-artifact@v4
        with:
          name: tee-simulator-plus-EXTRACT-INNER-ZIP
          path: tee-simulator-plus-v1.0.0.zip
          compression-level: 0

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: tee-simulator-plus-v1.0.0.zip
          generate_release_notes: true
          body: |
            # TEE Simulator Plus

            **Source:** ${{ env.TEESIMULATOR_REPO }} @ ${{ env.TEESIMULATOR_REF }}

            **Patches applied:**
            - **Latency Equalizer** in `AttestationPatcher.kt` — pads simulated attestation responses with a measured wait time + Gaussian jitter so the attested/non-attested timing ratio stays under the configured detection threshold

            **Bundled:**
            - KSU WebUI for keybox upload, target app selection, timing diagnostics, equalizer settings
            - `/data/adb/tricky_store/keybox.xml` and `target.txt` (Tricky-Store compatible)
            - `/data/adb/tricky_store/equalizer.conf` for runtime equalizer tuning
