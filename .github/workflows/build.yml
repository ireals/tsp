name: Build TEE Simulator Plus

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tricky_store_version:
        description: 'Tricky-Store release tag (default: 1.2.1)'
        required: false
        default: '1.2.1'

env:
  TRICKY_STORE_VERSION: ${{ github.event.inputs.tricky_store_version || '1.2.1' }}
  TRICKY_STORE_REPO: '5ec1cff/TrickyStore'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout WebUI
        uses: actions/checkout@v4

      - name: Download Tricky-Store release
        run: |
          mkdir -p _tricky_store
          cd _tricky_store
          # Try downloading the release zip from upstream
          TS_URL="https://github.com/${{ env.TRICKY_STORE_REPO }}/releases/download/${{ env.TRICKY_STORE_VERSION }}/Tricky-Store-${{ env.TRICKY_STORE_VERSION }}-release.zip"
          echo "Downloading: $TS_URL"
          # Try multiple naming patterns
          curl -sL -f -o tricky_store.zip "$TS_URL" || \
            curl -sL -f -o tricky_store.zip "https://github.com/${{ env.TRICKY_STORE_REPO }}/releases/download/${{ env.TRICKY_STORE_VERSION }}/Tricky-Store-${{ env.TRICKY_STORE_VERSION }}.zip" || \
            { echo "Failed to download Tricky-Store zip; listing release assets:"; \
              curl -sL "https://api.github.com/repos/${{ env.TRICKY_STORE_REPO }}/releases/tags/${{ env.TRICKY_STORE_VERSION }}" | grep '"browser_download_url"' || true; \
              exit 1; }
          echo "Downloaded:"
          ls -la tricky_store.zip
          unzip -l tricky_store.zip | head -50

      - name: Extract Tricky-Store contents
        run: |
          mkdir -p _tricky_store/extracted
          cd _tricky_store
          unzip -o tricky_store.zip -d extracted
          echo "=== Tricky-Store structure ==="
          find extracted -maxdepth 4 -type f | head -50

      - name: Merge with WebUI overlay
        run: |
          # Start with Tricky-Store as base
          rm -rf module_final
          cp -r _tricky_store/extracted module_final
          
          echo "=== Base Tricky-Store files ==="
          ls -la module_final/
          
          # Overlay our WebUI and additional scripts
          # Important: Do NOT overwrite Tricky-Store's core scripts (post-fs-data.sh, service.sh, customize.sh)
          # We only add WebUI components
          
          # Add webroot for KSU WebUI
          cp -r module/webroot module_final/
          echo "  + webroot/ added"
          
          # Add scripts directory but rename to avoid conflicts with Tricky-Store
          mkdir -p module_final/scripts
          cp module/scripts/bridge.sh module_final/scripts/
          cp module/scripts/keybox_manager.sh module_final/scripts/
          cp module/scripts/target_manager.sh module_final/scripts/
          cp module/scripts/config_manager.sh module_final/scripts/
          cp module/scripts/latency_profiler.sh module_final/scripts/
          chmod +x module_final/scripts/*.sh
          echo "  + scripts/ added"
          
          # Add docs
          mkdir -p module_final/docs
          cp -r module/docs/* module_final/docs/ 2>/dev/null || true
          
          # Add config directory
          mkdir -p module_final/config module_final/logs
          cp module/config/config.json module_final/config/ 2>/dev/null || true
          
          # Update module.prop to reflect this is a combined package
          if [ -f module_final/module.prop ]; then
            echo "=== Original Tricky-Store module.prop ==="
            cat module_final/module.prop
            
            # Modify id and name to indicate combined package
            sed -i 's/^id=.*/id=tee-simulator-plus/' module_final/module.prop
            sed -i 's/^name=.*/name=TEE Simulator Plus (Tricky-Store + WebUI)/' module_final/module.prop
            sed -i 's/^description=.*/description=Tricky-Store with KSU WebUI for keybox and target management. Includes upstream Tricky-Store core (5ec1cff)./' module_final/module.prop
            
            echo "=== Modified module.prop ==="
            cat module_final/module.prop
          fi
          
          # Append WebUI initialization to existing post-fs-data.sh (if any)
          if [ -f module_final/post-fs-data.sh ]; then
            echo "" >> module_final/post-fs-data.sh
            echo "# === TEE Simulator Plus WebUI initialization ===" >> module_final/post-fs-data.sh
            echo "MODDIR=\${0%/*}" >> module_final/post-fs-data.sh
            echo "[ -d /data/adb/tricky_store ] || mkdir -p /data/adb/tricky_store" >> module_final/post-fs-data.sh
            echo "[ -f /data/adb/tricky_store/target.txt ] || { echo '# Tricky-Store target list' > /data/adb/tricky_store/target.txt; chmod 644 /data/adb/tricky_store/target.txt; }" >> module_final/post-fs-data.sh
          fi
          
          echo "=== Final module structure ==="
          find module_final -maxdepth 3 -type f | sort

      - name: Package combined zip
        run: |
          cd module_final
          zip -r9 ../tee-simulator-plus-v1.0.0.zip . -x "*.gitkeep"
          cd ..
          echo "=== Final zip ==="
          ls -la tee-simulator-plus-v1.0.0.zip
          echo ""
          echo "=== Contents ==="
          unzip -l tee-simulator-plus-v1.0.0.zip
          echo ""
          echo "=== Integrity check ==="
          unzip -t tee-simulator-plus-v1.0.0.zip

      - name: Upload module zip
        uses: actions/upload-artifact@v4
        with:
          name: tee-simulator-plus-EXTRACT-INNER-ZIP
          path: tee-simulator-plus-v1.0.0.zip
          compression-level: 0

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: tee-simulator-plus-v1.0.0.zip
          generate_release_notes: true
          body: |
            # TEE Simulator Plus
            
            Tricky-Store ${{ env.TRICKY_STORE_VERSION }} (5ec1cff) + KSU WebUI manager.
            
            **Components:**
            - Upstream Tricky-Store core (unmodified)
            - KSU WebUI for keybox upload and target app management
            - Latency profiler/diagnostics tool
            
            **Credits:**
            - Tricky-Store: https://github.com/5ec1cff/TrickyStore
