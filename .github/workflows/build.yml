name: Build TEE Simulator Plus

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tricky_store_repo:
        description: 'TrickyStore source repo'
        required: false
        default: 'qwq233/TrickyStore'
      tricky_store_ref:
        description: 'Branch/tag/commit'
        required: false
        default: 'master'

env:
  TRICKY_STORE_REPO: ${{ github.event.inputs.tricky_store_repo || 'qwq233/TrickyStore' }}
  TRICKY_STORE_REF: ${{ github.event.inputs.tricky_store_ref || 'master' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout WebUI overlay
        uses: actions/checkout@v4
        with:
          path: overlay

      - name: Checkout TrickyStore source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TRICKY_STORE_REPO }}
          ref: ${{ env.TRICKY_STORE_REF }}
          path: trickystore
          submodules: recursive

      - name: Apply latency equalizer patch
        run: |
          cd trickystore
          
          # Locate KeystoreInterceptor.kt
          INTERCEPTOR=$(find . -name "KeystoreInterceptor.kt" | head -1)
          if [ -z "$INTERCEPTOR" ]; then
            echo "ERROR: KeystoreInterceptor.kt not found"
            exit 1
          fi
          echo "Patching: $INTERCEPTOR"
          
          # Apply our latency equalizer patch
          python3 ../overlay/patches/apply_latency_patch.py "$INTERCEPTOR"
          
          echo "=== Modified KeystoreInterceptor.kt (head) ==="
          head -80 "$INTERCEPTOR"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('trickystore/**/*.gradle*', 'trickystore/**/gradle-wrapper.properties') }}

      - name: Build TrickyStore module
        working-directory: trickystore
        run: |
          chmod +x gradlew
          ./gradlew :module:assembleRelease --stacktrace || \
            ./gradlew assembleRelease --stacktrace
          
          echo "=== Build outputs ==="
          find . -name "*.zip" -path "*/outputs/*" 2>/dev/null
          find module -name "*.so" 2>/dev/null | head -10

      - name: Locate built module zip
        id: locate
        run: |
          # Tricky-Store builds produce a zip via the magisk module gradle task
          MODULE_ZIP=$(find trickystore -name "*.zip" -path "*/outputs/*" | head -1)
          if [ -z "$MODULE_ZIP" ]; then
            # Fallback: look for module/build/outputs/
            MODULE_ZIP=$(find trickystore/module/build -name "*.zip" 2>/dev/null | head -1)
          fi
          if [ -z "$MODULE_ZIP" ]; then
            echo "ERROR: No module zip found"
            find trickystore -name "*.zip" 2>/dev/null
            find trickystore/module -type d 2>/dev/null | head -20
            exit 1
          fi
          echo "Found: $MODULE_ZIP"
          echo "module_zip=$MODULE_ZIP" >> $GITHUB_OUTPUT

      - name: Merge with WebUI overlay
        run: |
          mkdir -p _staging
          cd _staging
          
          # Extract built TrickyStore zip
          unzip -o "../${{ steps.locate.outputs.module_zip }}" >/dev/null
          echo "=== TrickyStore module structure ==="
          find . -maxdepth 3 -type f | sort
          
          # Add WebUI overlay
          cp -r ../overlay/module/webroot ./
          mkdir -p scripts
          cp ../overlay/module/scripts/bridge.sh scripts/
          cp ../overlay/module/scripts/keybox_manager.sh scripts/
          cp ../overlay/module/scripts/target_manager.sh scripts/
          cp ../overlay/module/scripts/config_manager.sh scripts/
          cp ../overlay/module/scripts/latency_profiler.sh scripts/
          chmod +x scripts/*.sh
          
          mkdir -p docs config logs
          cp -r ../overlay/module/docs/* docs/ 2>/dev/null || true
          cp ../overlay/module/config/config.json config/ 2>/dev/null || true
          
          # Update module.prop to combine identity
          if [ -f module.prop ]; then
            sed -i 's/^id=.*/id=tee-simulator-plus/' module.prop
            sed -i 's/^name=.*/name=TEE Simulator Plus (TrickyStore + WebUI + Latency Equalizer)/' module.prop
          fi
          
          # Append WebUI bootstrap to post-fs-data.sh
          if [ -f post-fs-data.sh ]; then
            echo "" >> post-fs-data.sh
            echo "# === TEE Simulator Plus initialization ===" >> post-fs-data.sh
            echo "[ -d /data/adb/tricky_store ] || mkdir -p /data/adb/tricky_store" >> post-fs-data.sh
            echo "[ -f /data/adb/tricky_store/target.txt ] || { echo '# Tricky-Store target list' > /data/adb/tricky_store/target.txt; chmod 644 /data/adb/tricky_store/target.txt; }" >> post-fs-data.sh
          fi
          
          echo "=== Final structure ==="
          find . -maxdepth 3 -type f | sort

      - name: Package final zip
        run: |
          cd _staging
          zip -r9 ../tee-simulator-plus-v1.0.0.zip . -x "*.gitkeep"
          cd ..
          ls -la tee-simulator-plus-v1.0.0.zip
          unzip -l tee-simulator-plus-v1.0.0.zip
          unzip -t tee-simulator-plus-v1.0.0.zip

      - name: Upload module zip
        uses: actions/upload-artifact@v4
        with:
          name: tee-simulator-plus-EXTRACT-INNER-ZIP
          path: tee-simulator-plus-v1.0.0.zip
          compression-level: 0

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: tee-simulator-plus-v1.0.0.zip
          generate_release_notes: true
          body: |
            # TEE Simulator Plus
            
            **Source:** ${{ env.TRICKY_STORE_REPO }} @ ${{ env.TRICKY_STORE_REF }}
            
            **Patches applied:**
            - Latency Equalizer (KeystoreInterceptor.kt) — adjusts attestation response timing to evade timing side-channel detection
            
            **Added:**
            - KSU WebUI for keybox / target / diagnostics / logs
            - Configuration via `/data/adb/tricky_store/keybox.xml` and `target.txt`
